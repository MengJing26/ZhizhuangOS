<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理系统 - 智装OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .header h1 {
            font-size: 32px;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            color: #00d4ff;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        
        .filter-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-section label {
            color: #00d4ff;
            font-weight: bold;
        }
        
        .filter-section input, .filter-section select {
            padding: 8px 15px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .filter-section button {
            padding: 8px 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .filter-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        
        .orders-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 60px 120px 150px 80px 80px 100px 200px 1fr 120px 80px;
            padding: 15px 20px;
            background: rgba(0, 212, 255, 0.1);
            font-weight: bold;
            color: #00d4ff;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            font-size: 13px;
        }
        
        .order-row {
            display: grid;
            grid-template-columns: 60px 120px 150px 80px 80px 100px 200px 1fr 120px 80px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            align-items: start;
            font-size: 13px;
        }
        
        .order-row:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        .order-row.pending {
            border-left: 3px solid #ffa500;
        }
        
        .order-row.shipped {
            border-left: 3px solid #00ff00;
        }
        
        .order-row.completed, .order-row.delivered {
            border-left: 3px solid #00d4ff;
        }
        
        .address-cell {
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            max-width: 300px;
            text-align: left;
            padding: 0 10px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }
        
        .status-shipped {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }
        
        .status-completed, .status-delivered {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .type-shipping {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }
        
        .type-command {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .type-links {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .type-unknown {
            background: rgba(100, 100, 100, 0.15);
            color: #888;
            border: 1px solid rgba(100, 100, 100, 0.3);
        }
        
        .no-orders {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.3s;
        }
        
        .btn-ship {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }
        
        .btn-complete {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        .btn-delete {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
        }
        
        .action-btn:hover {
            transform: scale(1.05);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* 过期预警弹窗样式 */
        .expiry-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .expiry-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
            border: 1px solid rgba(255, 165, 0, 0.5);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 165, 0, 0.2);
        }
        
        .expiry-modal .modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .expiry-modal h3 {
            color: #ffa500;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .expiry-modal p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        .expiry-modal .countdown {
            color: #ffa500;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .expiry-modal .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .expiry-modal .modal-btns button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .expiry-modal .btn-export {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
        }
        
        .expiry-modal .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        
        .expiry-modal .btn-dismiss {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .expiry-modal .btn-dismiss:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        @media (max-width: 1200px) {
            .table-header, .order-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .table-header > div, .order-row > div {
                display: flex;
                justify-content: space-between;
            }
            
            .table-header > div::before {
                content: attr(data-label);
                color: #00d4ff;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ 智装OS - 订单管理系统</h1>
            <p>全品类订单监控与管理平台</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">今日总订单</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">待发货</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="shippedOrders">0</div>
                <div class="stat-label">已发货</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="deliveredOrders">0</div>
                <div class="stat-label">已交付</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedOrders">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAmount">¥0</div>
                <div class="stat-label">今日销售额</div>
            </div>
        </div>
        
        <div class="filter-section">
            <label>筛选：</label>
            <input type="date" id="filterDate">
            <select id="filterStatus">
                <option value="">全部状态</option>
                <option value="pending">待发货</option>
                <option value="shipped">已发货</option>
                <option value="delivered">已交付</option>
                <option value="completed">已完成</option>
            </select>
            <select id="filterType">
                <option value="">全部类型</option>
                <option value="shipping">实物发货</option>
                <option value="command">命令交付</option>
                <option value="links">链接交付</option>
            </select>
            <input type="text" id="filterKeyword" placeholder="搜索订单号/商品/地址">
            <button onclick="filterOrders()">筛选</button>
            <button onclick="resetFilters()">重置</button>
            <button onclick="exportOrders()">导出数据</button>
        </div>
        
        <div class="orders-table">
            <div class="table-header">
                <div data-label="序号">序号</div>
                <div data-label="订单号">订单号</div>
                <div data-label="商品名称">商品名称</div>
                <div data-label="金额">金额</div>
                <div data-label="类型">类型</div>
                <div data-label="状态">状态</div>
                <div data-label="提交时间">提交时间</div>
                <div data-label="收货地址">收货地址</div>
                <div data-label="产品Key">产品Key</div>
                <div data-label="操作">操作</div>
            </div>
            <div id="ordersList">
                <div class="empty-state">
                    <div class="icon">📦</div>
                    <p>暂无订单数据</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const ORDERS_KEY = 'openclaw_orders';
        const SEQUENCE_KEY = 'openclaw_sequence';
        const LAST_DATE_KEY = 'openclaw_last_date';
        const EXPIRY_CHECK_KEY = 'openclaw_expiry_check_date';
        const MAX_RETENTION_DAYS = 15; // 订单数据最长保留15天
        const EXPIRY_WARNING_DAYS = 13; // 超过13天的订单视为即将过期，触发预警
        const AUTO_DELETE_TIMEOUT = 30000; // 预警弹窗30秒无操作自动删除过期数据

        // 订单类型显示配置
        const TYPE_LABELS = {
            'shipping': '实物发货',
            'command': '命令交付',
            'links': '链接交付',
            'unknown': '其他'
        };

        // 状态显示配置
        const STATUS_LABELS = {
            'pending': '待发货',
            'shipped': '已发货',
            'delivered': '已交付',
            'completed': '已完成'
        };
        
        // 当前是否为"仅显示今日"模式
        let showTodayOnly = true;
        
        function getCurrentDate() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }
        
        // 计算日期差（天数）
        function daysBetween(dateStr1, dateStr2) {
            const d1 = new Date(dateStr1);
            const d2 = new Date(dateStr2);
            return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
        }
        
        // 获取今日订单
        function getTodayOrders() {
            const today = getCurrentDate();
            return getAllOrders().filter(o => o.date === today);
        }
        
        // 获取即将过期的订单（超过EXPIRY_WARNING_DAYS天但未超过MAX_RETENTION_DAYS天）
        function getExpiringOrders() {
            const today = getCurrentDate();
            return getAllOrders().filter(o => {
                const days = daysBetween(o.date, today);
                return days >= EXPIRY_WARNING_DAYS && days < MAX_RETENTION_DAYS;
            });
        }
        
        // 获取已过期的订单（超过MAX_RETENTION_DAYS天）
        function getExpiredOrders() {
            const today = getCurrentDate();
            return getAllOrders().filter(o => daysBetween(o.date, today) >= MAX_RETENTION_DAYS);
        }
        
        // 删除过期订单数据
        function removeExpiredOrders() {
            const today = getCurrentDate();
            const orders = getAllOrders().filter(o => daysBetween(o.date, today) < MAX_RETENTION_DAYS);
            saveOrders(orders);
            return orders;
        }
        
        // 导出指定订单为CSV
        function exportSpecificOrders(orders) {
            if (orders.length === 0) return;
            const csv = [
                ['序号', '订单号', '商品名称', '金额', '类型', '状态', '提交时间', '收货地址', '产品Key'].join(','),
                ...orders.map(o => [
                    o.sequence,
                    o.orderNo,
                    o.productName,
                    '¥' + o.price,
                    TYPE_LABELS[o.orderType] || '其他',
                    STATUS_LABELS[o.status] || o.status,
                    new Date(o.createTime).toLocaleString('zh-CN'),
                    `"${(o.address || '').replace(/"/g, '""')}"`,
                    o.productKey || ''
                ].join(','))
            ].join('\n');
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `即将过期订单_${getCurrentDate()}.csv`;
            link.click();
        }
        
        // 显示过期预警弹窗
        function showExpiryWarning() {
            const expiringOrders = getExpiringOrders();
            const expiredOrders = getExpiredOrders();
            
            if (expiringOrders.length === 0 && expiredOrders.length === 0) return;
            
            // 每天只提示一次
            const today = getCurrentDate();
            const lastCheck = localStorage.getItem(EXPIRY_CHECK_KEY);
            if (lastCheck === today) return;
            localStorage.setItem(EXPIRY_CHECK_KEY, today);
            
            const overlay = document.createElement('div');
            overlay.className = 'expiry-modal-overlay';
            
            let content = '';
            if (expiredOrders.length > 0) {
                content = `
                    <div class="modal-icon">⚠️</div>
                    <h3>订单数据已过期</h3>
                    <p>有 <strong style="color:#ff6b6b">${expiredOrders.length}</strong> 条订单已超过 ${MAX_RETENTION_DAYS} 天保留期限，将被自动删除。</p>
                    ${expiringOrders.length > 0 ? `<p>另有 <strong style="color:#ffa500">${expiringOrders.length}</strong> 条订单即将过期。</p>` : ''}
                `;
            } else {
                content = `
                    <div class="modal-icon">⏰</div>
                    <h3>订单即将过期</h3>
                    <p>有 <strong style="color:#ffa500">${expiringOrders.length}</strong> 条订单即将超过 ${MAX_RETENTION_DAYS} 天保留期限，到期后将自动删除。</p>
                `;
            }
            
            overlay.innerHTML = `
                <div class="expiry-modal">
                    ${content}
                    <div class="countdown" id="expiryCountdown">自动处理倒计时：30秒</div>
                    <div class="modal-btns">
                        <button class="btn-export" id="btnExportExpiry">导出过期/即将过期订单</button>
                        <button class="btn-dismiss" id="btnDismissExpiry">知道了，暂不处理</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            let countdown = AUTO_DELETE_TIMEOUT / 1000;
            const countdownEl = document.getElementById('expiryCountdown');
            const timer = setInterval(() => {
                countdown--;
                if (countdownEl) countdownEl.textContent = `自动处理倒计时：${countdown}秒`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    // 超时自动删除过期数据
                    removeExpiredOrders();
                    document.body.removeChild(overlay);
                    updateStats();
                    renderOrders();
                }
            }, 1000);
            
            // 导出按钮
            document.getElementById('btnExportExpiry').onclick = () => {
                clearInterval(timer);
                const allWarningOrders = [...expiredOrders, ...expiringOrders];
                exportSpecificOrders(allWarningOrders);
                // 导出后删除过期数据
                removeExpiredOrders();
                document.body.removeChild(overlay);
                updateStats();
                renderOrders();
            };
            
            // 关闭按钮
            document.getElementById('btnDismissExpiry').onclick = () => {
                clearInterval(timer);
                // 仍然删除已过期的数据
                removeExpiredOrders();
                document.body.removeChild(overlay);
                updateStats();
                renderOrders();
            };
        }
        
        function getSequenceNumber() {
            const currentDate = getCurrentDate();
            const lastDate = localStorage.getItem(LAST_DATE_KEY);
            if (lastDate !== currentDate) {
                localStorage.setItem(LAST_DATE_KEY, currentDate);
                localStorage.setItem(SEQUENCE_KEY, '1');
                return 1;
            }
            let sequence = parseInt(localStorage.getItem(SEQUENCE_KEY) || '0') + 1;
            localStorage.setItem(SEQUENCE_KEY, sequence.toString());
            return sequence;
        }
        
        function getAllOrders() {
            const orders = localStorage.getItem(ORDERS_KEY);
            return orders ? JSON.parse(orders) : [];
        }
        
        function saveOrders(orders) {
            localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
        }
        
        function addOrder(orderData) {
            const orders = getAllOrders();
            const sequence = getSequenceNumber();
            const currentDate = getCurrentDate();
            const orderType = orderData.orderType || 'unknown';
            const newOrder = {
                id: Date.now(),
                sequence: sequence,
                orderNo: `ORD${currentDate.replace(/-/g, '')}${String(sequence).padStart(4, '0')}`,
                productName: orderData.productName,
                price: orderData.price,
                productKey: orderData.productKey || '',
                orderType: orderType,
                address: orderData.address || '',
                status: orderType === 'shipping' ? 'pending' : 'delivered',
                createTime: new Date().toISOString(),
                date: currentDate
            };
            orders.unshift(newOrder);
            saveOrders(orders);
            showTodayOnly = true;
            updateStats();
            renderOrders();
            return newOrder;
        }
        
        function updateOrderStatus(orderId, status) {
            const orders = getAllOrders();
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = status;
                saveOrders(orders);
                updateStats();
                renderOrders();
            }
        }
        
        function deleteOrder(orderId) {
            if (confirm('确定要删除这个订单吗？')) {
                const orders = getAllOrders().filter(o => o.id !== orderId);
                saveOrders(orders);
                updateStats();
                renderOrders();
            }
        }
        
        function updateStats() {
            const orders = getAllOrders();
            const today = getCurrentDate();
            const todayOrders = orders.filter(o => o.date === today);
            
            document.getElementById('totalOrders').textContent = todayOrders.length;
            document.getElementById('pendingOrders').textContent = todayOrders.filter(o => o.status === 'pending').length;
            document.getElementById('shippedOrders').textContent = todayOrders.filter(o => o.status === 'shipped').length;
            document.getElementById('deliveredOrders').textContent = todayOrders.filter(o => o.status === 'delivered').length;
            document.getElementById('completedOrders').textContent = todayOrders.filter(o => o.status === 'completed').length;
            
            const totalAmount = todayOrders.reduce((sum, o) => sum + parseFloat(o.price || 0), 0);
            document.getElementById('totalAmount').textContent = '¥' + totalAmount.toFixed(1);
        }
        
        function renderOrders(filteredOrders = null) {
            const orders = filteredOrders || (showTodayOnly ? getTodayOrders() : getAllOrders());
            const container = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <p>暂无订单数据</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => {
                const statusClass = `status-${order.status}`;
                const statusText = STATUS_LABELS[order.status] || order.status;
                const typeClass = `type-${order.orderType || 'unknown'}`;
                const typeText = TYPE_LABELS[order.orderType] || TYPE_LABELS['unknown'];
                const rowClass = order.status;
                const isShipping = order.orderType === 'shipping';
                const address = order.address || '-';
                const productKey = order.productKey || '-';
                
                // 操作按钮：实物订单有发货流程，虚拟订单直接完成
                let actions = '';
                if (isShipping) {
                    if (order.status === 'pending') actions += `<button class="action-btn btn-ship" onclick="updateOrderStatus(${order.id}, 'shipped')">发货</button>`;
                    if (order.status === 'shipped') actions += `<button class="action-btn btn-complete" onclick="updateOrderStatus(${order.id}, 'completed')">完成</button>`;
                } else {
                    if (order.status === 'delivered') actions += `<button class="action-btn btn-complete" onclick="updateOrderStatus(${order.id}, 'completed')">完成</button>`;
                }
                actions += `<button class="action-btn btn-delete" onclick="deleteOrder(${order.id})">删除</button>`;
                
                return `
                    <div class="order-row ${rowClass}">
                        <div>${order.sequence}</div>
                        <div>${order.orderNo}</div>
                        <div>${order.productName}</div>
                        <div>¥${order.price}</div>
                        <div><span class="type-badge ${typeClass}">${typeText}</span></div>
                        <div><span class="status-badge ${statusClass}">${statusText}</span></div>
                        <div>${new Date(order.createTime).toLocaleString('zh-CN')}</div>
                        <div class="address-cell">${address}</div>
                        <div>${productKey}</div>
                        <div>${actions}</div>
                    </div>
                `;
            }).join('');
        }
        
        function filterOrders() {
            const date = document.getElementById('filterDate').value;
            const status = document.getElementById('filterStatus').value;
            const type = document.getElementById('filterType').value;
            const keyword = document.getElementById('filterKeyword').value.toLowerCase();
            
            // 有搜索条件时从所有订单中搜索，否则只显示今日
            const hasFilter = date || status || type || keyword;
            let orders = hasFilter ? getAllOrders() : getTodayOrders();
            showTodayOnly = !hasFilter;
            
            if (date) orders = orders.filter(o => o.date === date);
            if (status) orders = orders.filter(o => o.status === status);
            if (type) orders = orders.filter(o => o.orderType === type);
            if (keyword) {
                orders = orders.filter(o => 
                    o.orderNo.toLowerCase().includes(keyword) ||
                    o.productName.toLowerCase().includes(keyword) ||
                    (o.address || '').toLowerCase().includes(keyword) ||
                    (o.productKey || '').toLowerCase().includes(keyword)
                );
            }
            
            renderOrders(orders);
        }
        
        function resetFilters() {
            document.getElementById('filterDate').value = getCurrentDate();
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterKeyword').value = '';
            showTodayOnly = true;
            renderOrders();
        }
        
        function exportOrders() {
            const orders = getAllOrders();
            const csv = [
                ['序号', '订单号', '商品名称', '金额', '类型', '状态', '提交时间', '收货地址', '产品Key'].join(','),
                ...orders.map(o => [
                    o.sequence,
                    o.orderNo,
                    o.productName,
                    '¥' + o.price,
                    TYPE_LABELS[o.orderType] || '其他',
                    STATUS_LABELS[o.status] || o.status,
                    new Date(o.createTime).toLocaleString('zh-CN'),
                    `"${(o.address || '').replace(/"/g, '""')}"`,
                    o.productKey || ''
                ].join(','))
            ].join('\n');
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `订单数据_${getCurrentDate()}.csv`;
            link.click();
        }
        
        // 监听来自主页面的消息
        window.addEventListener('message', function(event) {
            if (event.data.type === 'NEW_ORDER') {
                const order = addOrder(event.data.orderData);
                event.source.postMessage({ type: 'ORDER_CREATED', order: order }, '*');
            }
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 先清理已过期的订单数据（静默清理超过15天的）
            removeExpiredOrders();
            
            updateStats();
            renderOrders();
            document.getElementById('filterDate').value = getCurrentDate();
            
            // 检查并显示过期预警
            showExpiryWarning();
        });
    </script>
</body>
</html>
